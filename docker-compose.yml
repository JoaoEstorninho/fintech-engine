version: "3.9"

services:
  api:
    build: .
    container_name: fintech-api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0

  worker:
    build: .
    container_name: fintech-worker
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

  redis:
    image: redis:7
    container_name: fintech-redis
    ports:
      - "6379:6379"